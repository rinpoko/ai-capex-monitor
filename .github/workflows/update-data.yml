name: Update snapshot data

on:
  schedule:
    - cron: "0 */6 * * *"  # 6時間ごと (UTC)
  workflow_dispatch: {}     # 手動実行ボタン

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance

      - name: Build snapshot
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
        run: python -m app.fetcher

      - name: Copy snapshot into docs/ (GitHub Pages)
        run: |
          mkdir -p docs/data
          cp data/snapshot.json docs/data/snapshot.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/snapshot.json data/taiwan_revenue_history.json data/edgar_cik_map.json
          git diff --cached --quiet || git commit -m "chore: update snapshot data [skip ci]"
          git push
